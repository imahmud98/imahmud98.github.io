<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>Redirecting…</title>
<script>
// GitHub Pages 404 redirect — catches /share/{id}?k=key and forwards to backend.
// api.txt contains the live backend URL (updated by start.bat every launch).
(async function() {
  // 1. Load backend URL from api.txt
  let backend = '';
  try {
    const r = await fetch('/api.txt', { cache: 'no-store' });
    if (r.ok) {
      const t = (await r.text()).trim();
      if (t.startsWith('http')) backend = t.replace(/\/$/, '');
    }
  } catch(e) {}

  if (!backend) {
    document.getElementById('msg').textContent =
      'Backend is offline. Start the backend first, then try the link again.';
    return;
  }

  // 2. Build the target URL: backend + same path + same query + same fragment
  //    e.g. /share/abc123?k=KEY → https://ngrok-url/share/abc123?k=KEY#KEY
  const path     = window.location.pathname;
  const search   = window.location.search;    // ?k=KEY — survives WhatsApp/redirects
  const fragment = window.location.hash;      // #KEY — may be stripped by some apps
  const target   = backend + path + search + fragment;

  // 3. Redirect immediately
  window.location.replace(target);
})();
</script>
</head>
<body style="font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f9fafb;margin:0">
  <div style="text-align:center;max-width:360px;padding:2rem">
    <div style="font-size:3rem;margin-bottom:1rem">☁️</div>
    <h2 style="color:#111827;font-size:1.25rem;font-weight:700;margin:0 0 0.5rem">MyPocketDrive</h2>
    <p id="msg" style="color:#6b7280;font-size:0.875rem">Connecting to backend…</p>
  </div>
</body>
</html>
